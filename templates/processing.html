<!DOCTYPE html>

<head>

<title>Compress PDF Online – Reduce PDF File Size Free</title>
<meta name="description" content="Compress PDF files online to reduce file size while maintaining quality. Free and fast PDF compressor.">

<script>

function checkFile() {

fetch("/status/{{ file_name }}")
.then(response => response.json())
.then(data => {

if (data.ready) {

window.location.href = "/download/{{ file_name }}";

}

});

}

setInterval(checkFile, 2000);

</script>

</head>
