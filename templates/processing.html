<!DOCTYPE html>
<html>

<head>

<title>Compressing PDF</title>

<script>

let downloaded = false;

function checkFile() {

    if (downloaded) return;

    fetch("/download/{{ file_name }}", { method: "HEAD" })
    .then(response => {

        if (response.status === 200) {

            downloaded = true;

            window.location.href = "/download/{{ file_name }}";

        }

    });

}

setInterval(checkFile, 2000);

</script>

</head>

<body>

<h2>Compressing your PDF...</h2>

<p>Please wait a few seconds.</p>

</body>

</html>
