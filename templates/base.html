<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>{% block title %}QuickPDFTool{% endblock %}</title>

<meta name="description" content="{% block description %}Free online PDF tools to compress, convert and edit PDF files{% endblock %}">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<header class="topbar">

<h1 class="logo">
<a href="/">QuickPDFTool</a>
</h1>

<nav class="menu">

<a href="/">Home</a>

<a href="/pdf-tools">All Tools</a>

<a href="/blog">Guides</a>

</nav>

</header>


<div class="main-container">

{% block content %}
{% endblock %}

</div>


<footer class="footer">

<p>© 2026 QuickPDFTool</p>

<p>
Free online tools to compress, merge, convert and edit PDF files.
</p>

</footer>

<script>

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");

if(dropArea){

dropArea.addEventListener("dragover", function(e){
e.preventDefault();
dropArea.style.background="#f4f5f7";
});

dropArea.addEventListener("dragleave", function(){
dropArea.style.background="white";
});

dropArea.addEventListener("drop", function(e){
e.preventDefault();

const files = e.dataTransfer.files;
fileInput.files = files;

dropArea.style.background="white";
});

dropArea.addEventListener("click", function(){
fileInput.click();
});

}

</script>

</body>

</html>
