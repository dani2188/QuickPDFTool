{% extends "base.html" %}

{% block title %}JPG to PDF Converter{% endblock %}

{% block content %}

<h1>JPG to PDF</h1>

<p class="subtitle">
Convert JPG images into a PDF document.
</p>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="images" multiple required>

<br><br>

<button class="main-btn">Convert to PDF</button>

</form>

{% endblock %}
