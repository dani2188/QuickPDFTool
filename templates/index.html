<form method="POST" enctype="multipart/form-data">

<input type="file" name="pdf" required>

<br><br>

<label for="compression">Compression level:</label>

<select name="compression">

<option value="low">High quality</option>
<option value="medium" selected>Balanced (recommended)</option>
<option value="high">Strong compression</option>

</select>

<br><br>

<button type="submit" class="compress-btn">
Compress PDF
</button>

</form>
