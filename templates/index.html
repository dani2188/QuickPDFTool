<h1>Compress PDF</h1>
<p class="subtitle">Reduce PDF file size while preserving quality</p>

<form method="POST" enctype="multipart/form-data">

<div class="upload-card">

<input type="file" name="pdf" id="fileInput" required>

<p class="drop-text">Drop PDF here or click to upload</p>

</div>

<div class="compression">

<label>Compression level</label>

<select name="compression">

<option value="high">Strong compression</option>
<option value="medium" selected>Balanced (recommended)</option>
<option value="low">High quality</option>

</select>

</div>

<button type="submit" class="compress-btn">
Compress PDF
</button>

</form>
