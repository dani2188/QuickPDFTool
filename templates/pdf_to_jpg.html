{% extends "base.html" %}

{% block title %}PDF to JPG Converter{% endblock %}

{% block content %}

<h1>PDF to JPG</h1>

<p class="subtitle">
Convert PDF pages into JPG images.
</p>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="pdf" required>

<br><br>

<button class="main-btn">Convert to JPG</button>

</form>

{% endblock %}
