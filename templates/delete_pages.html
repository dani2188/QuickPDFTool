<!DOCTYPE html>
<html>

<head>
<title>Delete PDF Pages Online</title>
</head>

<body style="font-family:Arial; text-align:center; margin-top:100px">

<h2>Delete PDF Pages</h2>

<p>Upload a PDF and remove selected pages.</p>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="pdf" required>

<br><br>

<label>Pages to delete (example: 2,5,7)</label>

<br><br>

<input type="text" name="pages" placeholder="2,5,7" required>

<br><br>

<button type="submit">Remove Pages</button>

</form>

</body>

</html>
