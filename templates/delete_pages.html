{% extends "base.html" %}

{% block title %}Delete PDF Pages{% endblock %}

{% block content %}

<h1>Delete PDF Pages</h1>

<p class="subtitle">
Remove unwanted pages from your PDF.
</p>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="pdf" required>

<br><br>

<input type="text" name="pages" placeholder="Example: 2,5,7">

<br><br>

<button class="main-btn">Delete Pages</button>

</form>

{% endblock %}
