<!DOCTYPE html>
<html>

<head>
<title>Protect PDF Online – Add Password to PDF</title>

<meta name="description" content="Secure your PDF with a password. Protect PDF files online in seconds.">
</head>

<body style="font-family:Arial; text-align:center; margin-top:100px">

<h2>Protect PDF</h2>

<p>Add a password to secure your PDF.</p>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="pdf" required>

<br><br>

<input type="password" name="password" placeholder="Enter password" required>

<br><br>

<button type="submit">Protect PDF</button>

</form>

</body>

</html>
