{% extends "base.html" %}

{% block title %}Add Page Numbers to PDF{% endblock %}

{% block content %}

<h1>Add Page Numbers</h1>

<p class="subtitle">
Automatically number pages in your PDF.
</p>

<form method="POST" enctype="multipart/form-data">

<input type="file" name="pdf" required>

<br><br>

<button class="main-btn">Add Page Numbers</button>

</form>

{% endblock %}
